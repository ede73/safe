<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
    width="48"
    height="48"
    viewBox="0 0 48 48"
    version="1.1"
    xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Shackle gradient -->
        <linearGradient id="shackle_grad" x1="14.5" y1="22" x2="25.5" y2="6.4" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#78909C" />
            <stop offset="30%" stop-color="#B0BEC5" />
            <stop offset="60%" stop-color="#ECEFF1" />
            <stop offset="80%" stop-color="#90CAF9" />
            <stop offset="100%" stop-color="#64B5F6" />
        </linearGradient>

        <!-- Padlock Cylinder Body gradient -->
        <linearGradient id="body_grad" x1="8" y1="30.5" x2="32" y2="30.5" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#B57C00" />
            <stop offset="20%" stop-color="#FFCA28" />
            <stop offset="50%" stop-color="#FFD54F" />
            <stop offset="80%" stop-color="#FFB300" />
            <stop offset="100%" stop-color="#B57C00" />
        </linearGradient>

        <!-- Padlock Cylinder Top Surface gradient -->
        <linearGradient id="top_grad" x1="20" y1="19.5" x2="20" y2="24.5" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#FFE082" />
            <stop offset="100%" stop-color="#FFCA28" />
        </linearGradient>

        <!-- Key Head gradient -->
        <linearGradient id="key_head_grad" x1="26" y1="10.5" x2="38" y2="22.5" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#FFF59D" />
            <stop offset="25%" stop-color="#FFD54F" />
            <stop offset="65%" stop-color="#FFC107" />
            <stop offset="100%" stop-color="#FF8F00" />
        </linearGradient>

        <!-- Key Shaft/Teeth gradient -->
        <linearGradient id="key_shaft_grad" x1="30.5" y1="28.75" x2="36.3" y2="28.75" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#FFE082" />
            <stop offset="50%" stop-color="#FFC107" />
            <stop offset="100%" stop-color="#FF8F00" />
        </linearGradient>
    </defs>

    <g id="padlock_and_key">
        <!-- Shackle of the padlock -->
        <path
            fill="none"
            stroke="url(#shackle_grad)"
            stroke-width="4.5"
            stroke-linecap="round"
            d="M 14.5,22 V 12 C 14.5,8.9 17,6.4 20,6.4 C 23,6.4 25.5,8.9 25.5,12 V 22" />

        <!-- White metallic shine/highlight on the shackle -->
        <path
            fill="none"
            stroke="#FFFFFF"
            stroke-width="1.0"
            stroke-linecap="round"
            d="M 15.5,14 A 4.5,4.5 0 0 1 20,7.5" />

        <!-- Padlock Cylinder Body -->
        <path
            fill="url(#body_grad)"
            d="M 8,22 L 8,39 C 8,40.4 13.4,41.5 20,41.5 C 26.6,41.5 32,40.4 32,39 L 32,22 C 32,23.4 26.6,24.5 20,24.5 C 13.4,24.5 8,23.4 8,22 Z" />

        <!-- Padlock Cylinder Top Surface -->
        <path
            fill="url(#top_grad)"
            d="M 20,24.5 C 26.6,24.5 32,23.4 32,22 C 32,20.6 26.6,19.5 20,19.5 C 13.4,19.5 8,20.6 8,22 C 8,23.4 13.4,24.5 20,24.5 Z" />

        <!-- Top rim highlight on the cylinder -->
        <path
            fill="none"
            stroke="#FFF9C4"
            stroke-width="0.5"
            d="M 8.5,22 C 8.5,23.2 13.6,24 20,24 C 26.4,24 31.5,23.2 31.5,22" />

        <!-- Keyhole -->
        <path
            fill="#1E120C"
            d="M 20,27.5 C 19.2,27.5 18.5,28.2 18.5,29 C 18.5,29.6 18.9,30.1 19.4,30.3 L 18.5,34.5 H 21.5 L 20.6,30.3 C 21.1,30.1 21.5,29.6 21.5,29 C 21.5,28.2 20.8,27.5 20,27.5 Z" />

        <!-- Keyhole subtle 3D highlight edge -->
        <path
            fill="none"
            stroke="#FFF59D"
            stroke-width="0.4"
            d="M 18.5,34.5 H 21.5" />

        <!-- The Key -->
        <!-- Head/Ring of the key -->
        <path
            fill="url(#key_head_grad)"
            d="M 32,10.5 C 28.7,10.5 26,13.2 26,16.5 C 26,19.8 28.7,22.5 32,22.5 C 35.3,22.5 38,19.8 38,16.5 C 38,13.2 35.3,10.5 32,10.5 Z M 32,13.8 C 33.5,13.8 34.7,15 34.7,16.5 C 34.7,18 33.5,19.2 32,19.2 C 30.5,19.2 29.3,18 29.3,16.5 C29.3,15 30.5,13.8 32,13.8 Z" />

        <!-- Key Shaft and Teeth -->
        <path
            fill="url(#key_shaft_grad)"
            d="M 30.5,22.5 H 33.5 V 25 H 36.3 V 28 H 33.5 V 29 H 35.7 V 32 H 33.5 V 35 H 30.5 Z" />

        <!-- Key shaft left-edge vertical highlight -->
        <path
            fill="none"
            stroke="#FFF9C4"
            stroke-width="0.5"
            d="M 31.0,22.5 V 34.5" />

        <!-- Key head top-left curved highlight -->
        <path
            fill="none"
            stroke="#FFFFFF"
            stroke-width="0.8"
            stroke-linecap="round"
            d="M 27.5,14.5 A 4.5,4.5 0 0 1 32.5,11.5" />
    </g>
</svg>
